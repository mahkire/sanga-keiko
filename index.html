<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>山河道場 相撲バトル</title>
    <style>
body{
    font-family:sans-serif;
    background:#ececec;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
}

.menu{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:10px 18px;
    margin:5px;
    cursor:pointer;
}

#status{
    margin:15px 0;
    padding:10px;
    background:#f8f8f8;
    display:flex;
    justify-content:space-between;
    gap:20px;
    flex-wrap:nowrap;
    align-items:flex-start;
    overflow-x:auto;
}

#status > div{
    flex:1 1 0;
    min-width:0;
}

.fighterArea{
    display:flex;
    justify-content:space-between;
    gap:20px;
}

.hpOuter{
    width:400px;
    height:28px;
    background:#ddd;
    border-radius:15px;
    overflow:hidden;
}

.hpInner{
    height:100%;
    width:100%;
    background:#2ecc71;
    transition:.4s;
}

#ringContainer{
    position:relative;
    height:50px;
    background:#ddd;
    margin-top:30px;
    border-radius:25px;
}

#ringMarker{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#e74c3c;
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    transition:.5s;
}

#positionText{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}

#battleArea{
    text-align:center;
    margin-top:20px;
}

#result{
    margin-top:20px;
    padding:10px;
    background:#fafafa;
}

#battleLog{
    margin-top:20px;
    border:1px solid #ccc;
    height:250px;
    overflow-y:auto;
    padding:10px;
    background:white;
}
</style>
</head>
<body>

<div class="container">

    <h1>山河道場 相撲バトル</h1>

    <div class="menu">
        <label for="playerSelect">プレイヤー:</label>
        <select id="playerSelect"></select>
        <label for="enemySelect">相手:</label>
        <select id="enemySelect"></select>
        <button id="statusBtn">能力確認</button>
        <button id="battleBtn">対戦開始</button>
        <button id="autoBtn">オート</button>
    </div>

    <div id="status"></div>

    <div class="fighterArea">
        <div>
            <h3 id="playerName">プレイヤー</h3>
            <div class="hpOuter">
                <div id="playerHPBar" class="hpInner"></div>
            </div>
            <div id="playerHPText"></div>
        </div>

        <div>
            <h3 id="enemyName">相手</h3>
            <div class="hpOuter">
                <div id="enemyHPBar" class="hpInner"></div>
            </div>
            <div id="enemyHPText"></div>
        </div>
    </div>

    <div id="ringContainer">
        <div id="ringMarker"></div>
    </div>

    <div id="positionText"></div>

    <div id="battleArea">
        <button class="techBtn" data-tech="押し">押し</button>
        <button class="techBtn" data-tech="寄り">寄り</button>
        <button class="techBtn" data-tech="投げ">投げ</button>
        <button class="techBtn" data-tech="はたき">はたき</button>
    </div>

    <div id="result"></div>

    <div id="battleLog"></div>

</div>

<script>
const characters = [

{
    name:"藤沢陸斗",
    maxHP:180,
    power:26,
    technique:40,
    speed:35,
    stamina:30,
    weight:49,
    mental:45,
    favorite:"はたき"
},

{
    name:"弓原夏希",
    maxHP:400,
    power:75,
    technique:90,
    speed:85,
    stamina:100,
    weight:50,
    mental:90,
    favorite:"投げ"
},

{
    name:"道野明紀",
    maxHP:360,
    power:95,
    technique:65,
    speed:45,
    stamina:75,
    weight:67,
    mental:75,
    favorite:"押し"
},

{
    name:"吉岡春輝",
    maxHP:230,
    power:50,
    technique:45,
    speed:35,
    stamina:35,
    weight:61,
    mental:20,
    favorite:"寄り"
},

{
    name:"秋山将人",
    maxHP:380,
    power:85,
    technique:45,
    speed:45,
    stamina:55,
    weight:71,
    mental:70,
    favorite:"押し"
},

{
    name:"西川祐樹",
    maxHP:280,
    power:40,
    technique:90,
    speed:55,
    stamina:45,
    weight:56,
    mental:70,
    favorite:"投げ"
},

{
    name:"丸内まどか",
    maxHP:300,
    power:90,
    technique:30,
    speed:60,
    stamina:75,
    weight:47,
    mental:80,
    favorite:"寄り"
},

{
    name:"松山響",
    maxHP:240,
    power:65,
    technique:25,
    speed:25,
    stamina:30,
    weight:79,
    mental:65,
    favorite:"寄り"
},

{
    name:"田中雪",
    maxHP:250,
    power:60,
    technique:40,
    speed:40,
    stamina:40,
    weight:46,
    mental:30,
    favorite:"寄り"
},

{
    name:"牧野琥太郎",
    maxHP:200,
    power:20,
    technique:35,
    speed:70,
    stamina:20,
    weight:38,
    mental:60,
    favorite:"はたき"
},

{
    name:"西川未来",
    maxHP:260,
    power:40,
    technique:40,
    speed:45,
    stamina:90,
    weight:43,
    mental:60,
    favorite:"寄り"
},

{
    name:"二宮紅梨",
    maxHP:340,
    power:80,
    technique:40,
    speed:70,
    stamina:65,
    weight:61,
    mental:75,
    favorite:"押し"
}

];

const techniques = {

押し:{
    power:1.8,
    technique:0.3,
    speed:0.3,
    weight:0.8
},

寄り:{
    power:2,
    technique:0.1,
    speed:0.1,
    weight:1
},

投げ:{
    power:0.8,
    technique:1.6,
    speed:0.8,
    weight:0.0
},

はたき:{
    power:0.2,
    technique:2,
    speed:1.5,
    weight:-0.5
}

};
</script>
<script>
let player;
let enemy;

let playerHP;
let enemyHP;

let position = 0;
let lastWinnerTech;
let lastPositionChangeTech;
let turnCount = 0;

function calculateScore(ch,tech){

    const t = techniques[tech];

    let score =

    ch.power*t.power +
    ch.technique*t.technique +
    ch.speed*t.speed +
    ch.weight*t.weight +
    ch.mental*0.4;

    if(tech === ch.favorite){
        score += 25;
    }

    score -= 30 * turnCount / ch.stamina;
    let finalScore = score

    if((ch === player && playerHP <= 0) ||
       (ch === enemy && enemyHP <= 0)){
        finalScore *= 0.5;
    }

    return finalScore;
}

function compatibility(a,b){

    const strong = {

        投げ:"寄り",
        押し:"投げ",
        はたき:"押し",
        寄り:"はたき"

    };

    return strong[a] === b;
}

function executeTurn(playerTech){

    turnCount += 1;

    const techs = Object.keys(techniques);

    let enemyTech;
    if(Math.random() < 0.5){
        enemyTech = enemy.favorite;
    }else{
        enemyTech = techs[Math.floor(Math.random()*techs.length)];
    }

    let playerScore =
    calculateScore(player,playerTech);

    let enemyScore =
    calculateScore(enemy,enemyTech);

    if(enemyTech === "寄り"){
        const baseScore = playerScore;
        const yoriScore = calculateScore(player, "寄り");
        playerScore = baseScore * 0.7 + yoriScore * 0.3;
    }

    if(playerTech === "寄り"){
        const baseScore = enemyScore;
        const yoriScore = calculateScore(enemy, "寄り");
        enemyScore = baseScore * 0.7 + yoriScore * 0.3;
    }

    playerScore += Math.random()*20;
    enemyScore += Math.random()*20;

    if(compatibility(playerTech, enemyTech)){
        playerScore += 50;
    } else if(compatibility(enemyTech, playerTech)){
        enemyScore += 50;
    }

    const diff =
    playerScore - enemyScore;

    resolveBattle(
        diff,
        playerTech,
        enemyTech
    );

    return {
        playerTech,
        enemyTech,
        playerScore,
        enemyScore,
        diff
    };
}

function resolveBattle(
    diff,
    playerTech,
    enemyTech
){

    const winnerTech =
    diff > 0 ? playerTech : enemyTech;
    lastWinnerTech = winnerTech;

    let damage =
    Math.floor(Math.abs(diff)/6);

    if(winnerTech==="投げ"){
        damage *= 1.8;
    }

    if(winnerTech==="はたき"){
        damage *= 1.4;
    }

    damage = Math.floor(Math.max(5,damage));

    if(diff > 0){

        enemyHP -= damage;
        enemyHP = Math.max(0, enemyHP);

        if(playerTech==="押し"){

            position +=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(playerTech==="寄り"){

            position +=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }

    }else{

        playerHP -= damage;
        playerHP = Math.max(0, playerHP);

        if(enemyTech==="押し"){

            position -=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(enemyTech==="寄り"){

            position -=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }
    }

    position =
    Math.max(
        -200,
        Math.min(200,position)
    );
}

function checkWinner(){

    if(position >= 200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: player.name,
            method: method
        };
    }

    if(position <= -200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: enemy.name,
            method: method
        };
    }

    return null;
}
</script>
<script>
const playerSelect =
document.getElementById(
"playerSelect"
);
const enemySelect =
document.getElementById(
"enemySelect"
);
const autoBtn =
document.getElementById(
"autoBtn"
);

let gameActive = false;
let autoEnabled = false;
let autoIntervalId = null;

function updateEnemyOptions(){
    const playerIndex = Number(playerSelect.value);
    enemySelect.innerHTML = "";
    characters.forEach((c,i)=>{
        if(i === playerIndex) return;
        const option = document.createElement("option");
        option.value = i;
        option.textContent = c.name;
        enemySelect.appendChild(option);
    });
    if(enemySelect.options.length > 0){
        enemySelect.value = enemySelect.options[0].value;
    }
}

characters.forEach((c,i)=>{
    const option = document.createElement("option");
    option.value = i;
    option.textContent = c.name;
    playerSelect.appendChild(option);
});

updateEnemyOptions();
playerSelect.addEventListener("change", updateEnemyOptions);

function startBattle(){
    player = characters[playerSelect.value];
    enemy = characters[enemySelect.value];
    if(enemy.name === player.name){
        const available = characters.filter((c) => c.name !== player.name);
        enemy = available[Math.floor(Math.random() * available.length)];
    }

    playerHP =
    player.maxHP;

    enemyHP =
    enemy.maxHP;

    position = 0;
    turnCount = 0;

    gameActive = true;

    updateStatus();
    updateHP();
    updateRing();

    document
    .getElementById(
    "battleLog"
    ).innerHTML = "";

    document
    .getElementById(
    "result"
    ).innerHTML = "";

    if(autoEnabled){
        startAuto();
    }
}

function stopAuto(){
    if(autoIntervalId !== null){
        clearInterval(autoIntervalId);
        autoIntervalId = null;
    }
}

function toggleAuto(on){
    autoEnabled = on;
    autoBtn.textContent = on ? "オート: ON" : "オート: OFF";
    if(on){
        if(gameActive){
            startAuto();
        }
    } else {
        stopAuto();
    }
}

function performTurn(tech){
    if(!player) return;
    if(!gameActive) return;

    const result = executeTurn(tech);
    updateHP();
    updateRing();

    addLog(

`${player.name}
【${result.playerTech}】

vs

${enemy.name}
【${result.enemyTech}】

差:
${Math.round(result.diff)}
`
    );

    const winner = checkWinner();
    if(winner){
        const methodText = {
            "押し":"押し出し",
            "寄り":"寄り切り",
            "投げ":"投げ",
            "はたき":"はたき"
        }[winner.method] || winner.method;

        document
        .getElementById(
        "result"
        ).innerHTML =

        `<h2>${winner.winner}の勝利！</h2>
        <p>決まり手：${methodText}</p>`;

        gameActive = false;
        stopAuto();
    }
}

function chooseAutoTech(){
    const techs = Object.keys(techniques);
    if(Math.random() < 0.5){
        return player.favorite;
    }
    return techs[Math.floor(Math.random() * techs.length)];
}

function startAuto(){
    if(autoIntervalId !== null) return;
    if(!gameActive) return;

    autoIntervalId = setInterval(() => {
        if(!gameActive){
            stopAuto();
            return;
        }
        performTurn(chooseAutoTech());
    }, 1000);
}

function updateStatus(){

    document
    .getElementById("status")
    .innerHTML =

`
<div>
<h3>${player.name}</h3>

HP ${player.maxHP}<br>
馬力 ${player.power}<br>
技術 ${player.technique}<br>
速度 ${player.speed}<br>
体格 ${player.weight}<br>
総合力 ${(player.maxHP / 4) + player.power + player.technique + player.speed + player.weight}<br>
得意技 ${player.favorite}<br>
</div>

<div>
<h3>${enemy.name}</h3>

HP ${enemy.maxHP}<br>
馬力 ${enemy.power}<br>
技術 ${enemy.technique}<br>
速度 ${enemy.speed}<br>
体格 ${enemy.weight}<br>
総合力 ${(enemy.maxHP / 4) + enemy.power + enemy.technique + enemy.speed + enemy.weight}<br>
得意技 ${enemy.favorite}<br>
</div>
`;
}

function updateHP(){

    const playerRate =
    (playerHP/player.maxHP)
    *100;

    const enemyRate =
    (enemyHP/enemy.maxHP)
    *100;

    document
    .getElementById(
    "playerHPBar"
    ).style.width =
    playerRate+"%";

    document
    .getElementById(
    "enemyHPBar"
    ).style.width =
    enemyRate+"%";

    document
    .getElementById(
    "playerHPText"
    ).textContent =
    `${playerHP}/${player.maxHP}`;

    document
    .getElementById(
    "enemyHPText"
    ).textContent =
    `${enemyHP}/${enemy.maxHP}`;

    document
    .getElementById(
    "playerName"
    ).textContent =
    player.name;

    document
    .getElementById(
    "enemyName"
    ).textContent =
    enemy.name;
}

function updateRing(){

    const percent =
    ((position+200)/400)
    *100;

    document
    .getElementById(
    "ringMarker"
    ).style.left =
    percent+"%";

    document
    .getElementById(
    "positionText"
    ).textContent =
    `位置 ${Math.round(position)}`;
}

function addLog(text){

    const log =
    document.getElementById(
    "battleLog"
    );

    log.innerHTML =
    text+"<br><hr>" +
    log.innerHTML;
}

document
.querySelectorAll(
".techBtn"
)
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{
    performTurn(btn.dataset.tech);
});
});

autoBtn.addEventListener(
"click",
()=>{
    toggleAuto(!autoEnabled);
}
);

document
.getElementById(
"statusBtn"
)
.addEventListener(
"click",
()=>{
    const status = document.getElementById("status");
    status.style.display = status.style.display === "none" ? "flex" : "none";
}
);

document
.getElementById(
"battleBtn"
)
.addEventListener(
"click",
startBattle
);
</script>

</body>
</html>
