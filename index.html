const techniques = {

    weight:0.8
},

寄り:{

},

投げ:{

    speed:0.8,
    weight:0.0
},

<script>
let player;
let enemy;

let playerHP;
let enemyHP;

let position = 0;
let lastWinnerTech;
let lastPositionChangeTech;
let turnCount = 0;

function calculateScore(ch,tech,currentHP = null,currentTurn = null){

    const t = techniques[tech];

    let score =

    ch.power*t.power +
    ch.technique*t.technique +
    ch.speed*t.speed +
    ch.weight*t.weight +
    ch.mental*0.4;

    if(tech === ch.favorite){
        score += 25;
    }

    const turn = currentTurn !== null ? currentTurn : turnCount;
    score -= 30 * turn / ch.stamina;
    let finalScore = score;

    if(currentHP !== null){
        if(currentHP <= 0){
            finalScore *= 0.5;
        }
    } else if((ch === player && playerHP <= 0) ||
       (ch === enemy && enemyHP <= 0)){
        finalScore *= 0.5;
    }

    return finalScore;
}

const cpuTraining = {
    aggregate: createTechCounts()
};

function createTechCounts(){
    return {
        押し:1,
        寄り:1,
        投げ:1,
        はたき:1
    };
}

function ensureTrainingStats(stats, enemyName, playerName){
    if(!stats[enemyName]){
        stats[enemyName] = {
            aggregate: createTechCounts()
        };
    }
    if(!stats[enemyName][playerName]){
        stats[enemyName][playerName] = createTechCounts();
    }
}

function getRandomPair(list){
    const first = list[Math.floor(Math.random()*list.length)];
    let second = list[Math.floor(Math.random()*list.length)];
    while(second === first){
        second = list[Math.floor(Math.random()*list.length)];
    }
    return [first, second];
}

function sampleTrainingTech(ch){
    const techs = Object.keys(techniques);
    if(Math.random() < 0.5){
        return ch.favorite;
    }
    return techs[Math.floor(Math.random()*techs.length)];
}

function simulateTrainingBattle(a,b){
    let hpA = a.maxHP;
    let hpB = b.maxHP;
    let position = 0;
    let turn = 0;

    let winnerTech = null;
    while(true){
        turn += 1;

        const techA = sampleTrainingTech(a);
        const techB = sampleTrainingTech(b);
        winnerTech = techA;

        let scoreA = calculateScore(a, techA, hpA, turn);
        let scoreB = calculateScore(b, techB, hpB, turn);

        if(techB === "寄り"){
            const yoriA = calculateScore(a, "寄り", hpA, turn);
            scoreA = scoreA * 0.7 + yoriA * 0.3;
        }
        if(techA === "寄り"){
            const yoriB = calculateScore(b, "寄り", hpB, turn);
            scoreB = scoreB * 0.7 + yoriB * 0.3;
        }

        scoreA += Math.random()*20;
        scoreB += Math.random()*20;

        if(compatibility(techA, techB)){
            scoreA += 50;
        } else if(compatibility(techB, techA)){
            scoreB += 50;
        }

        const diff = scoreA - scoreB;

        if(diff > 0){
            let damage = Math.floor(Math.abs(diff)/6);
            if(techA === "投げ") damage = Math.floor(damage*1.8);
            if(techA === "はたき") damage = Math.floor(damage*1.4);
            damage = Math.max(5, damage);
            hpB -= damage;
            if(techA === "押し"){
                position += Math.floor(Math.abs(diff)/1);
            }
            if(techA === "寄り"){
                position += Math.floor(Math.abs(diff)/1.5);
            }
        } else {
            winnerTech = techB;
            let damage = Math.floor(Math.abs(diff)/6);
            if(techB === "投げ") damage = Math.floor(damage*1.8);
            if(techB === "はたき") damage = Math.floor(damage*1.4);
            damage = Math.max(5, damage);
            hpA -= damage;
            if(techB === "押し"){
                position -= Math.floor(Math.abs(diff)/1);
            }
            if(techB === "寄り"){
                position -= Math.floor(Math.abs(diff)/1.5);
            }
        }

        hpA = Math.max(0, hpA);
        hpB = Math.max(0, hpB);
        position = Math.max(-200, Math.min(200, position));

        const winner = checkWinnerTraining(position, hpA, hpB, a, b);
        if(winner){
            return winner.tech ? winner : { ...winner, tech: winnerTech };
        }

        if(turn >= 120){
            return hpA >= hpB ? { character: a, opponent: b, tech: techA } : { character: b, opponent: a, tech: techB };
        }
    }
}

function checkWinnerTraining(position, hpA, hpB, a, b){
    if(position >= 200 || hpB <= 0){
        return { character: a, opponent: b, tech: null };
    }
    if(position <= -200 || hpA <= 0){
        return { character: b, opponent: a, tech: null };
    }
    return null;
}

function chooseCpuTech(enemy, player){
    const matchup = cpuTraining[enemy.name]?.[player.name];
    const techs = Object.keys(techniques);
    if(matchup){
        let bestTech = techs[0];
        let bestScore = matchup[bestTech];
        techs.forEach((tech) => {
            if(matchup[tech] > bestScore){
                bestScore = matchup[tech];
                bestTech = tech;
            }
        });
        if(Math.random() < 0.1){
            return techs[Math.floor(Math.random() * techs.length)];
        }
        return bestTech;
    }

    if(Math.random() < 0.5){
        return enemy.favorite;
    }
    return techs[Math.floor(Math.random()*techs.length)];
}

function runCpuTraining(){
    const trainingCount = 1000;
    for(let i=0;i<trainingCount;i++){
        const [a,b] = getRandomPair(characters);
        const winner = simulateTrainingBattle(a,b);
        const winnerName = winner.character.name;
        const loserName = winner.opponent.name;
        ensureTrainingStats(cpuTraining, winnerName, loserName);
        cpuTraining[winnerName][loserName][winner.tech] += 1;
        cpuTraining[winnerName].aggregate[winner.tech] += 1;
    }
}

runCpuTraining();
trainingSummary.textContent = "AI CPU: 1000戦学習済み";

function compatibility(a,b){

    const strong = {

        投げ:"寄り",
        押し:"投げ",
        はたき:"押し",
        寄り:"はたき"

    };

    return strong[a] === b;
}

function executeTurn(playerTech){

    turnCount += 1;

    const techs = Object.keys(techniques);

    let enemyTech;
    if(enemyAIEnabled){
        enemyTech = chooseCpuTech(enemy, player);
    } else if(Math.random() < 0.5){
        enemyTech = enemy.favorite;
    } else {
        enemyTech = techs[Math.floor(Math.random()*techs.length)];
    }

    let playerScore =
    calculateScore(player,playerTech);

    let enemyScore =
    calculateScore(enemy,enemyTech);

    if(enemyTech === "寄り"){
        const baseScore = playerScore;
        const yoriScore = calculateScore(player, "寄り");
        playerScore = baseScore * 0.7 + yoriScore * 0.3;
    }

    if(playerTech === "寄り"){
        const baseScore = enemyScore;
        const yoriScore = calculateScore(enemy, "寄り");
        enemyScore = baseScore * 0.7 + yoriScore * 0.3;
    }

    playerScore += Math.random()*20;
    enemyScore += Math.random()*20;

    if(compatibility(playerTech, enemyTech)){
        playerScore += 50;
    } else if(compatibility(enemyTech, playerTech)){
        enemyScore += 50;
    }

    const diff =
    playerScore - enemyScore;

    resolveBattle(
        diff,
        playerTech,
        enemyTech
    );

    return {
        playerTech,
        enemyTech,
        playerScore,
        enemyScore,
        diff
    };
}

function resolveBattle(
    diff,
    playerTech,
    enemyTech
){

    const winnerTech =
    diff > 0 ? playerTech : enemyTech;
    lastWinnerTech = winnerTech;

    let damage =
    Math.floor(Math.abs(diff)/6);

    if(winnerTech==="投げ"){
        damage *= 1.8;
    }

    if(winnerTech==="はたき"){
        damage *= 1.4;
    }

    damage = Math.floor(Math.max(5,damage));

    if(diff > 0){

        enemyHP -= damage;
        enemyHP = Math.max(0, enemyHP);

        if(playerTech==="押し"){

            position +=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(playerTech==="寄り"){

            position +=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }

    }else{

        playerHP -= damage;
        playerHP = Math.max(0, playerHP);

        if(enemyTech==="押し"){

            position -=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(enemyTech==="寄り"){

            position -=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }
    }

    position =
    Math.max(
        -200,
        Math.min(200,position)
    );
}

function checkWinner(){

    if(position >= 200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: player.name,
            method: method
        };
    }

    if(position <= -200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: enemy.name,
            method: method
        };
    }

    return null;
}
</script>
<script>
const playerSelect =
document.getElementById(
"playerSelect"
);
const enemySelect =
document.getElementById(
"enemySelect"
);
const playerAIToggle =
document.getElementById(
"playerAIToggle"
);
const enemyCpuToggle =
document.getElementById(
"enemyCpuToggle"
);
const trainingSummary =
document.getElementById(
"trainingSummary"
);
const autoBtn =
document.getElementById(
"autoBtn"
);

let gameActive = false;
let autoEnabled = false;
let playerAIEnabled = false;
let enemyAIEnabled = true;
let autoIntervalId = null;

function updateEnemyOptions(){
    const playerIndex = Number(playerSelect.value);
    enemySelect.innerHTML = "";
    characters.forEach((c,i)=>{
        if(i === playerIndex) return;
        const option = document.createElement("option");
        option.value = i;
        option.textContent = c.name;
        enemySelect.appendChild(option);
    });
    if(enemySelect.options.length > 0){
        enemySelect.value = enemySelect.options[0].value;
    }
}

characters.forEach((c,i)=>{
    const option = document.createElement("option");
    option.value = i;
    option.textContent = c.name;
    playerSelect.appendChild(option);
});

updateEnemyOptions();

playerAIToggle.addEventListener("change", () => {
    playerAIEnabled = playerAIToggle.checked;
});

enemyCpuToggle.addEventListener("change", () => {
    enemyAIEnabled = enemyCpuToggle.checked;
});

function startBattle(){
    player = characters[playerSelect.value];
    enemy = characters[enemySelect.value];
    playerAIEnabled = playerAIToggle.checked;
    enemyAIEnabled = enemyCpuToggle.checked;
    if(enemy.name === player.name){
        const available = characters.filter((c) => c.name !== player.name);
        enemy = available[Math.floor(Math.random() * available.length)];
    }

    playerHP =
    player.maxHP;

    enemyHP =
    enemy.maxHP;

    position = 0;
    turnCount = 0;

    gameActive = true;

    updateStatus();
    updateHP();
    updateRing();

    document
    .getElementById(
    "battleLog"
    ).innerHTML = "";

    document
    .getElementById(
    "result"
    ).innerHTML = "";

    if(autoEnabled){
        startAuto();
    }
}

function stopAuto(){
    if(autoIntervalId !== null){
        clearInterval(autoIntervalId);
        autoIntervalId = null;
    }
}

function toggleAuto(on){
    autoEnabled = on;
    autoBtn.textContent = on ? "オート: ON" : "オート: OFF";
    if(on){
        if(gameActive){
            startAuto();
        }
    } else {
        stopAuto();
    }
}

function performTurn(tech){
    if(!player) return;
    if(!gameActive) return;

    const result = executeTurn(tech);
    updateHP();
    updateRing();

    addLog(

`${player.name}
【${result.playerTech}】

vs

${enemy.name}
【${result.enemyTech}】

差:
${Math.round(result.diff)}
`
    );

    const winner = checkWinner();
    if(winner){
        const methodText = {
            "押し":"押し出し",
            "寄り":"寄り切り",
            "投げ":"投げ",
            "はたき":"はたき"
        }[winner.method] || winner.method;

        document
        .getElementById(
        "result"
        ).innerHTML =

        `<h2>${winner.winner}の勝利！</h2>
        <p>決まり手：${methodText}</p>`;

        gameActive = false;
        stopAuto();
    }
}

function choosePlayerTech(){
    const techs = Object.keys(techniques);
    if(playerAIEnabled){
        if(autoEnabled || playerAIEnabled){
            const matchup = cpuTraining[player.name]?.[enemy.name];
            if(matchup){
                let bestTech = techs[0];
                let bestScore = matchup[bestTech];
                techs.forEach((tech) => {
                    if(matchup[tech] > bestScore){
                        bestScore = matchup[tech];
                        bestTech = tech;
                    }
                });
                if(Math.random() < 0.1){
                    return techs[Math.floor(Math.random() * techs.length)];
                }
                return bestTech;
            }
        }
    }
    if(Math.random() < 0.5){
        return player.favorite;
    }
    return techs[Math.floor(Math.random()*techs.length)];
}

function startAuto(){
    if(autoIntervalId !== null) return;
    if(!gameActive) return;

    autoIntervalId = setInterval(() => {
        if(!gameActive){
            stopAuto();
            return;
        }
        if(autoEnabled){
            performTurn(choosePlayerTech());
        }
    }, 1000);
}

function updateStatus(){

    document
    .getElementById("status")
    .innerHTML =

`
<div>
<h3>${player.name}</h3>

HP ${player.maxHP}<br>
馬力 ${player.power}<br>
技術 ${player.technique}<br>
速度 ${player.speed}<br>
体格 ${player.weight}<br>
総合力 ${(player.maxHP / 4) + player.power + player.technique + player.speed + player.weight}<br>
得意技 ${player.favorite}<br>
</div>

<div>
<h3>${enemy.name}</h3>

HP ${enemy.maxHP}<br>
馬力 ${enemy.power}<br>
技術 ${enemy.technique}<br>
速度 ${enemy.speed}<br>
体格 ${enemy.weight}<br>
総合力 ${(enemy.maxHP / 4) + enemy.power + enemy.technique + enemy.speed + enemy.weight}<br>
得意技 ${enemy.favorite}<br>
</div>
`;
}

function updateHP(){

    const playerRate =
    (playerHP/player.maxHP)
    *100;

    const enemyRate =
    (enemyHP/enemy.maxHP)
    *100;

    document
    .getElementById(
    "playerHPBar"
    ).style.width =
    playerRate+"%";

    document
    .getElementById(
    "enemyHPBar"
    ).style.width =
    enemyRate+"%";

    document
    .getElementById(
    "playerHPText"
    ).textContent =
    `${playerHP}/${player.maxHP}`;

    document
    .getElementById(
    "enemyHPText"
    ).textContent =
    `${enemyHP}/${enemy.maxHP}`;

    document
    .getElementById(
    "playerName"
    ).textContent =
    player.name;

    document
    .getElementById(
    "enemyName"
    ).textContent =
    enemy.name;
}

function updateRing(){

    const percent =
    ((position+200)/400)
    *100;

    document
    .getElementById(
    "ringMarker"
    ).style.left =
    percent+"%";

    document
    .getElementById(
    "positionText"
    ).textContent =
    `位置 ${Math.round(position)}`;
}

function addLog(text){

    const log =
    document.getElementById(
    "battleLog"
    );

    log.innerHTML =
    text+"<br><hr>" +
    log.innerHTML;
}

document
.querySelectorAll(
".techBtn"
)
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{
    performTurn(btn.dataset.tech);
});
});

autoBtn.addEventListener(
"click",
()=>{
    toggleAuto(!autoEnabled);
}
);

document
.getElementById(
"statusBtn"
)
.addEventListener(
"click",
()=>{
    const status = document.getElementById("status");
    status.style.display = status.style.display === "none" ? "flex" : "none";
}
);

document
.getElementById(
"battleBtn"
)
.addEventListener(
"click",
startBattle
);
</script>

</body>
</html>
