<script>
let player;
let enemy;

let playerHP;
let enemyHP;

let position = 0;
let lastWinnerTech;
let lastPositionChangeTech;
let lastPlayerTech = null;
let lastEnemyTech = null;
let lastPlayerDefenseStreak = 0;
let lastEnemyDefenseStreak = 0;
let lastPlayerYoroke = 0;
let lastEnemyYoroke = 0;
let lastPlayerIkigire = 0;
let lastEnemyIkigire = 0;
let turnCount = 0;

function isDefenseTech(tech){
    return tech === "投げ" || tech === "はたき";
}

function applyConsecutiveDefensePenalty(score, streak){
    if(streak >= 2){
        return {
            score: score - (streak - 1) * 20,
            penalty: (streak - 1) * 20
        };
    }
    return {
        score,
        penalty: 0
    };
}

function getNextDefenseStreak(currentTech, prevTech, prevStreak){
    if(isDefenseTech(currentTech)){
        if(isDefenseTech(prevTech) || prevStreak > 0){
            return prevStreak + 1;
        }
        return 1;
    }

    if(prevStreak > 0){
        return Math.max(prevStreak - 3, 1);
    }

    return 0;
}

function calculateScore(ch,tech,currentHP = null,currentTurn = null){

    const t = techniques[tech];

    let score =

    ch.power*t.power +
    ch.technique*t.technique +
    ch.speed*t.speed +
    ch.weight*t.weight +
    ch.mental*0.4;

    if(tech === ch.favorite){
        score += 25;
    }

    const turn = currentTurn !== null ? currentTurn : turnCount;
    const staminaPenalty = 50 * turn / ch.stamina;
    score -= staminaPenalty;
    let finalScore = score;

    if(currentHP !== null){
        if(currentHP <= 0){
            finalScore *= 0.5;
        }
    } else if((ch === player && playerHP <= 0) ||
       (ch === enemy && enemyHP <= 0)){
        finalScore *= 0.5;
    }

    return {
        score: finalScore,
        staminaPenalty
    };
}

const cpuTraining = {};

function createTechCounts(){
    return {
        押し:1,
        寄り:1,
        投げ:1,
        はたき:1
    };
}

function ensureTrainingStats(stats, enemyName, playerName){
    if(!stats[enemyName]){
        stats[enemyName] = {};
    }
    if(!stats[enemyName][playerName]){
        stats[enemyName][playerName] = createTechCounts();
        stats[enemyName][playerName]._counts = createTechCounts();
    }
}

function randomTrainingTech(ch){
    if(Math.random() < 0.5){
        return ch.favorite;
    }
    return techList[Math.floor(Math.random() * techList.length)];
}

function simulateTrainingScore(a, techA, b, techB, prevTechA = null, prevTechB = null, prevStreakA = 0, prevStreakB = 0){
    const calcA = calculateScore(a, techA, a.maxHP, 1);
    const calcB = calculateScore(b, techB, b.maxHP, 1);

    const streakA = getNextDefenseStreak(techA, prevTechA, prevStreakA);
    const streakB = getNextDefenseStreak(techB, prevTechB, prevStreakB);
    const penA = applyConsecutiveDefensePenalty(calcA.score, streakA);
    const penB = applyConsecutiveDefensePenalty(calcB.score, streakB);

    let scoreA = penA.score;
    let scoreB = penB.score;

    if(techB === "寄り"){
        const yoriA = calculateScore(a, "寄り", a.maxHP, 1).score;
        scoreA = scoreA * 0.7 + yoriA * 0.3;
    }
    if(techA === "寄り"){
        const yoriB = calculateScore(b, "寄り", b.maxHP, 1).score;
        scoreB = scoreB * 0.7 + yoriB * 0.3;
    }

    if(compatibility(techA, techB)){
        scoreA += 50;
    } else if(compatibility(techB, techA)){
        scoreB += 50;
    }

    scoreA += Math.random() * 20;
    scoreB += Math.random() * 20;

    return { scoreA, scoreB };
}

function chooseCpuTech(enemy, player){
    const matchup = cpuTraining[enemy.name]?.[player.name];
    if(matchup){
        let bestTech = techList[0];
        let bestAverage = matchup[bestTech] / matchup._counts[bestTech];
        techList.forEach((tech) => {
            const average = matchup[tech] / matchup._counts[tech];
            if(average > bestAverage){
                bestAverage = average;
                bestTech = tech;
            }
        });
        if(Math.random() < 0.15){
            return techList[Math.floor(Math.random() * techList.length)];
        }
        return bestTech;
    }

    if(Math.random() < 0.5){
        return enemy.favorite;
    }
    return techList[Math.floor(Math.random() * techList.length)];
}

function runCpuTraining(){
    const trainingCountPerPair = 50;
    const pairs = [];
    for(let i = 0; i < characters.length; i++){
        for(let j = i + 1; j < characters.length; j++){
            pairs.push([characters[i], characters[j]]);
        }
    }

    pairs.forEach(([a, b]) => {
        ensureTrainingStats(cpuTraining, a.name, b.name);
        ensureTrainingStats(cpuTraining, b.name, a.name);
        let prevTechA = null;
        let prevTechB = null;
        let prevStreakA = 0;
        let prevStreakB = 0;
        for(let k = 0; k < trainingCountPerPair; k++){
            const techA = randomTrainingTech(a);
            const techB = randomTrainingTech(b);
            const { scoreA, scoreB } = simulateTrainingScore(a, techA, b, techB, prevTechA, prevTechB, prevStreakA, prevStreakB);

            cpuTraining[a.name][b.name][techA] += scoreA;
            cpuTraining[a.name][b.name]._counts[techA] += 1;
            cpuTraining[b.name][a.name][techB] += scoreB;
            cpuTraining[b.name][a.name]._counts[techB] += 1;

            prevStreakA = getNextDefenseStreak(techA, prevTechA, prevStreakA);
            prevStreakB = getNextDefenseStreak(techB, prevTechB, prevStreakB);
            prevTechA = techA;
            prevTechB = techB;
        }
    });

    const totalBattles = pairs.length * trainingCountPerPair;
    trainingSummary.textContent = `AI CPU: ${totalBattles}戦学習済み`;
}

function compatibility(a,b){

    const strong = {

        投げ:"寄り",
        押し:"投げ",
        はたき:"押し",
        寄り:"はたき"

    };

    return strong[a] === b;
}

function executeTurn(playerTech){

    turnCount += 1;

    let enemyTech;
    if(enemyAIEnabled){
        enemyTech = chooseCpuTech(enemy, player);
    } else if(Math.random() < 0.5){
        enemyTech = enemy.favorite;
    } else {
        enemyTech = techList[Math.floor(Math.random()*techList.length)];
    }

    const calcPlayer = calculateScore(player, playerTech, playerHP, turnCount);
    const currentPlayerStreak = getNextDefenseStreak(playerTech, lastPlayerTech, lastPlayerDefenseStreak);
    const playerPenalty = applyConsecutiveDefensePenalty(calcPlayer.score, currentPlayerStreak);

    const calcEnemy = calculateScore(enemy, enemyTech, enemyHP, turnCount);
    const currentEnemyStreak = getNextDefenseStreak(enemyTech, lastEnemyTech, lastEnemyDefenseStreak);
    const enemyPenalty = applyConsecutiveDefensePenalty(calcEnemy.score, currentEnemyStreak);

    lastPlayerDefenseStreak = currentPlayerStreak;
    lastEnemyDefenseStreak = currentEnemyStreak;
    lastPlayerTech = playerTech;
    lastEnemyTech = enemyTech;
    lastPlayerYoroke = playerPenalty.penalty;
    lastEnemyYoroke = enemyPenalty.penalty;
    lastPlayerIkigire = Math.round(calcPlayer.staminaPenalty);
    lastEnemyIkigire = Math.round(calcEnemy.staminaPenalty);

    let playerScore = playerPenalty.score;
    let enemyScore = enemyPenalty.score;

    if(enemyTech === "寄り"){
        const yoriScore = calculateScore(player, "寄り", playerHP, turnCount).score;
        playerScore = playerScore * 0.7 + yoriScore * 0.3;
    }

    if(playerTech === "寄り"){
        const yoriScore = calculateScore(enemy, "寄り", enemyHP, turnCount).score;
        enemyScore = enemyScore * 0.7 + yoriScore * 0.3;
    }

    playerScore += Math.random()*20;
    enemyScore += Math.random()*20;

    if(compatibility(playerTech, enemyTech)){
        playerScore += 50;
    } else if(compatibility(enemyTech, playerTech)){
        enemyScore += 50;
    }

    const diff =
    playerScore - enemyScore;

    resolveBattle(
        diff,
        playerTech,
        enemyTech
    );

    updateEffects();

    return {
        playerTech,
        enemyTech,
        playerScore,
        enemyScore,
        diff
    };
}

function resolveBattle(
    diff,
    playerTech,
    enemyTech
){

    const winnerTech =
    diff > 0 ? playerTech : enemyTech;
    lastWinnerTech = winnerTech;

    let damage =
    Math.floor(Math.abs(diff)/6);

    if(winnerTech==="投げ" || winnerTech==="はたき"){
        damage *= 2.5;
    }

    damage = Math.floor(Math.max(5,damage));

    if(diff > 0){

        enemyHP -= damage;
        enemyHP = Math.max(0, enemyHP);

        if(playerTech==="押し"){

            position +=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(playerTech==="寄り"){

            position +=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }

    }else{

        playerHP -= damage;
        playerHP = Math.max(0, playerHP);

        if(enemyTech==="押し"){

            position -=
            Math.floor(
            Math.abs(diff)/1
            );
            lastPositionChangeTech = "押し";

        }

        if(enemyTech==="寄り"){

            position -=
            Math.floor(
            Math.abs(diff)/1.5
            );
            lastPositionChangeTech = "寄り";

        }
    }

    position =
    Math.max(
        -200,
        Math.min(200,position)
    );
}

function checkWinner(){

    if(enemyHP <= 0 && (lastWinnerTech === "投げ" || lastWinnerTech === "はたき")){
        return {
            winner: player.name,
            method: lastWinnerTech
        };
    }

    if(playerHP <= 0 && (lastWinnerTech === "投げ" || lastWinnerTech === "はたき")){
        return {
            winner: enemy.name,
            method: lastWinnerTech
        };
    }

    if(position >= 200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: player.name,
            method: method
        };
    }

    if(position <= -200){
        const method = lastPositionChangeTech === "寄り" ? "寄り切り" : "押し出し";
        return {
            winner: enemy.name,
            method: method
        };
    }

    return null;
}
</script>
<script>
const playerSelect =
document.getElementById(
"playerSelect"
);
const enemySelect =
document.getElementById(
"enemySelect"
);
const playerAIToggle =
document.getElementById(
"playerAIToggle"
);
const enemyCpuToggle =
document.getElementById(
"enemyCpuToggle"
);
const trainingSummary =
document.getElementById(
"trainingSummary"
);
const autoBtn =
document.getElementById(
"autoBtn"
);

runCpuTraining();

let gameActive = false;
let autoEnabled = false;
let playerAIEnabled = false;
let enemyAIEnabled = true;
let autoIntervalId = null;

function updateEnemyOptions(){
    const playerIndex = Number(playerSelect.value);
    enemySelect.innerHTML = "";
    characters.forEach((c,i)=>{
        if(i === playerIndex) return;
        const option = document.createElement("option");
        option.value = i;
        option.textContent = c.name;
        enemySelect.appendChild(option);
    });
    if(enemySelect.options.length > 0){
        enemySelect.value = enemySelect.options[0].value;
    }
}

characters.forEach((c,i)=>{
    const option = document.createElement("option");
    option.value = i;
    option.textContent = c.name;
    playerSelect.appendChild(option);
});

playerSelect.addEventListener("change", updateEnemyOptions);

updateEnemyOptions();

playerAIToggle.addEventListener("change", () => {
    playerAIEnabled = playerAIToggle.checked;
});

enemyCpuToggle.addEventListener("change", () => {
    enemyAIEnabled = enemyCpuToggle.checked;
});

function startBattle(){
    player = characters[playerSelect.value];
    enemy = characters[enemySelect.value];
    playerAIEnabled = playerAIToggle.checked;
    enemyAIEnabled = enemyCpuToggle.checked;
    if(enemy.name === player.name){
        const available = characters.filter((c) => c.name !== player.name);
        enemy = available[Math.floor(Math.random() * available.length)];
    }

    playerHP =
    player.maxHP;

    enemyHP =
    enemy.maxHP;

    position = 0;
    turnCount = 0;
    lastPlayerTech = null;
    lastEnemyTech = null;
    lastPlayerDefenseStreak = 0;
    lastEnemyDefenseStreak = 0;
    lastPlayerYoroke = 0;
    lastEnemyYoroke = 0;
    lastPlayerIkigire = 0;
    lastEnemyIkigire = 0;
    lastWinnerTech = null;
    lastPositionChangeTech = null;

    gameActive = true;

    updateStatus();
    updateHP();
    updateRing();

    document
    .getElementById(
    "battleLog"
    ).innerHTML = "";

    document
    .getElementById(
    "result"
    ).innerHTML = "";

    if(autoEnabled){
        startAuto();
    }
}

function stopAuto(){
    if(autoIntervalId !== null){
        clearInterval(autoIntervalId);
        autoIntervalId = null;
    }
}

function toggleAuto(on){
    autoEnabled = on;
    autoBtn.textContent = on ? "オート: ON" : "オート: OFF";
    if(on){
        if(gameActive){
            startAuto();
        }
    } else {
        stopAuto();
    }
}

function performTurn(tech){
    if(!player) return;
    if(!gameActive) return;

    const result = executeTurn(tech);
    updateHP();
    updateRing();
    updateEffects();

    addLog(

`${player.name}
【${result.playerTech}】

vs

${enemy.name}
【${result.enemyTech}】

差:
${Math.round(result.diff)}
`
    );

    const winner = checkWinner();
    if(winner){
        const methodText = {
            "押し":"押し出し",
            "寄り":"寄り切り",
            "投げ":"上手投げ",
            "はたき":"はたき込み"
        }[winner.method] || winner.method;

        document
        .getElementById(
        "result"
        ).innerHTML =

        `<h2>${winner.winner}の勝利！</h2>
        <p>決まり手：${methodText}</p>`;

        gameActive = false;
        stopAuto();
    }
}

function choosePlayerTech(){
    if(playerAIEnabled){
        const matchup = cpuTraining[player.name]?.[enemy.name];
        if(matchup){
            let bestTech = techList[0];
            let bestScore = matchup[bestTech];
            techList.forEach((tech) => {
                if(matchup[tech] > bestScore){
                    bestScore = matchup[tech];
                    bestTech = tech;
                }
            });
            if(Math.random() < 0.1){
                return techList[Math.floor(Math.random() * techList.length)];
            }
            return bestTech;
        }
    }
    if(Math.random() < 0.5){
        return player.favorite;
    }
    return techList[Math.floor(Math.random()*techList.length)];
}

function startAuto(){
    if(autoIntervalId !== null) return;
    if(!gameActive) return;

    autoIntervalId = setInterval(() => {
        if(!gameActive){
            stopAuto();
            return;
        }
        if(autoEnabled){
            performTurn(choosePlayerTech());
        }
    }, 1000);
}

function updateStatus(){

    document
    .getElementById("status")
    .innerHTML =

`
<div>
<h3>${player.name}</h3>

HP ${player.maxHP}<br>
馬力 ${player.power}<br>
技術 ${player.technique}<br>
速度 ${player.speed}<br>
体格 ${player.weight}<br>
持久力 ${player.stamina}<br>
総合力 ${(player.maxHP / 4) + player.power + player.technique + player.speed + player.weight + (player.stamina / 2)}<br>
得意技 ${player.favorite}<br>
</div>

<div>
<h3>${enemy.name}</h3>

HP ${enemy.maxHP}<br>
馬力 ${enemy.power}<br>
技術 ${enemy.technique}<br>
速度 ${enemy.speed}<br>
体格 ${enemy.weight}<br>
持久力 ${enemy.stamina}<br>
総合力 ${(enemy.maxHP / 4) + enemy.power + enemy.technique + enemy.speed + enemy.weight + (enemy.stamina / 2)}<br>
得意技 ${enemy.favorite}<br>
</div>
`;
    updateEffects();
}

function updateEffects(){
    document.getElementById("yorokeText").textContent =
        `プレイヤー ${lastPlayerYoroke} / 相手 ${lastEnemyYoroke}`;
    document.getElementById("ikigireText").textContent =
        `プレイヤー ${lastPlayerIkigire} / 相手 ${lastEnemyIkigire}`;
}

function updateHP(){

    const playerRate =
    (playerHP/player.maxHP)
    *100;

    const enemyRate =
    (enemyHP/enemy.maxHP)
    *100;

    document
    .getElementById(
    "playerHPBar"
    ).style.width =
    playerRate+"%";

    document
    .getElementById(
    "enemyHPBar"
    ).style.width =
    enemyRate+"%";

    document
    .getElementById(
    "playerHPText"
    ).textContent =
    `${playerHP}/${player.maxHP}`;

    document
    .getElementById(
    "enemyHPText"
    ).textContent =
    `${enemyHP}/${enemy.maxHP}`;

    document
    .getElementById(
    "playerName"
    ).textContent =
    player.name;

    document
    .getElementById(
    "enemyName"
    ).textContent =
    enemy.name;
}

function updateRing(){

    const percent =
    ((position+200)/400)
    *100;

    document
    .getElementById(
    "ringMarker"
    ).style.left =
    percent+"%";

    document
    .getElementById(
    "positionText"
    ).textContent =
    `位置 ${Math.round(position)}`;
}

function addLog(text){

    const log =
    document.getElementById(
    "battleLog"
    );

    log.innerHTML =
    text+"<br><hr>" +
    log.innerHTML;
}

document
.querySelectorAll(
".techBtn"
)
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{
    performTurn(btn.dataset.tech);
});
});

autoBtn.addEventListener(
"click",
()=>{
    toggleAuto(!autoEnabled);
}
);

document
.getElementById(
"statusBtn"
)
.addEventListener(
"click",
()=>{
    const status = document.getElementById("status");
    status.style.display = status.style.display === "none" ? "flex" : "none";
}
);

document
.getElementById(
"battleBtn"
)
.addEventListener(
"click",
startBattle
);
</script>

</body>
</html>
